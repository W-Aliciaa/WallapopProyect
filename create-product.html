<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advertisement Creation</title>
  <link rel="stylesheet" href="./notifications/styles.css">
  <link rel="stylesheet" href="./create-product/creationStyles.css"> 
</head>
<body>
  
  <section class="notifications-container"></section>

  <section class="spinner-container"></section>

  <main class="create-product-form-container">
    <h1>Publicar un nuevo anuncio</h1>
    
    <form id="create-product-form">
      <div class="form-group">
        <label for="product-name">Nombre del producto *</label>
        <input type="text" id="product-name" name="name" required placeholder="Ej. Patinete eléctrico">
      </div>

      <div class="form-group">
        <label for="product-description">Descripción *</label>
        <textarea id="product-description" name="description" required placeholder="Describe el estado de tu producto..."></textarea>
      </div>

      <div class="form-group">
        <label for="product-price">Precio (€) *</label>
        <input type="number" id="product-price" name="price" min="0" step="0.01" required placeholder="0.00">
      </div>

      <div class="form-group">
        <label for="product-transaction">¿Qué quieres hacer? *</label>
        <select id="product-transaction" name="transactionType" required>
          <option value="">Selecciona una opción</option>
          <option value="venta">Vender producto</option>
          <option value="compra">Comprar producto</option>
        </select>
      </div>

      <div class="form-group">
        <label for="product-photo">Foto del producto (Opcional)</label>
        <input type="file" id="product-photo" name="photo" accept="image/*">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">Publicar Anuncio</button>
        <a href="/" class="btn-cancel">Cancelar</a>
      </div>
    </form>
  </main>

  <script type="module" src="create-product.js"></script>
</body>
</html>
