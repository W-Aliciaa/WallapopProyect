<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./notifications/styles.css">
  <style>
    .tweet {
      border: solid 1px gray;
      border-radius: 12px;
      padding: 0.5rem;
    }

    .tweet-link {
      text-decoration: none;
      color: inherit;
    }

    .tweet-link + .tweet-link {
      margin-top: 1rem;
      display: block;
    }

    .spinner {
      width: 50px;
      padding: 8px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #25b09b;
      --_m: 
        conic-gradient(#0000 10%,#000),
        linear-gradient(#000 0 0) content-box;
      -webkit-mask: var(--_m);
              mask: var(--_m);
      -webkit-mask-composite: source-out;
              mask-composite: subtract;
      animation: l3 1s infinite linear;
    }
    @keyframes l3 {to{transform: rotate(1turn)}}


  </style>
</head>
<body>
  <header class="session-container"></header>

  <h1>Hello World KC!</h1>

  <section class="create-tweet-container"></section>

  <section class="notifications-container"></section>
  
  <section class="spinner-container"></section>

  <section class="tweets-container"></section>

  <script>
    console.log("hello world!");
  </script>
  <script type="module" src="index.js"></script>
</body>
</html>
